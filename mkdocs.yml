site_name: Theory of Knowledge
repo_url: https://github.com/dmccreary/theory-of-knowledge
site_url: https://dmccreary.github.io/theory-of-knowledge/
site_description: An interactive intelligent textbook for the IB Theory of Knowledge (TOK) course.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About the Course: about.md
  - Course Description: course-description.md

  - Chapters:
    - List of Chapters: chapters/index.md
    - 1. Foundations of Knowledge: chapters/01-foundations-of-knowledge/index.md
    - 2. Theories of Truth and Knowledge: chapters/02-theories-of-truth-and-knowledge/index.md
    - 3. Evidence and Justification: chapters/03-evidence-and-justification/index.md
    - 4. Knowledge and the Knower: chapters/04-knowledge-and-the-knower/index.md
    - 5. Cognitive Biases: chapters/05-cognitive-biases/index.md
    - 6. Reasoning and Argumentation: chapters/06-reasoning-and-argumentation/index.md
    - 7. Knowledge and Language: chapters/07-knowledge-and-language/index.md
    - 8. Skepticism and Intellectual Virtues: chapters/08-skepticism-and-intellectual-virtues/index.md
    - 9. Areas of Knowledge and Mathematics: chapters/09-areas-of-knowledge-and-mathematics/index.md
    - 10. Natural Sciences and Scientific Method: chapters/10-natural-sciences-and-scientific-method/index.md
    - 11. Human Sciences and History: chapters/11-human-sciences-and-history/index.md
    - 12. The Arts as Knowledge: chapters/12-the-arts-as-knowledge/index.md
    - 13. Ethics and Values in Knowledge: chapters/13-ethics-and-values-in-knowledge/index.md
    - 14. Knowledge, Technology, and Power: chapters/14-knowledge-technology-and-power/index.md
    - 15. Misinformation and the Information Age: chapters/15-misinformation-and-the-information-age/index.md
    - 16. TOK Assessment and Synthesis: chapters/16-tok-assessment-and-synthesis/index.md

  - MicroSims:
    - List of MicroSims: sims/index.md
    - Critical Thinking Cycle: sims/critical-thinking-cycle/index.md
    - JTB Venn Diagram - Justified True Belief: sims/knowledge-jtb-venn/index.md
    - Learning Graph Viewer: sims/graph-viewer/index.md
    - Personal and Shared Knowledge: sims/personal-shared-knowledge/index.md
    - Reflective Thinking Quiz: sims/reflective-thinking-quiz/index.md


  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept List: learning-graph/concept-list.md
    - Quality Metrics: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution: learning-graph/taxonomy-distribution.md
    - Mascot Style Guide: learning-graph/mascot-test.md


  - Prompts:
    - List of Prompts: prompts/index.md
    - prompts/01-seed.md
    - prompts/02-learning-graph-generator.md
    - prompts/03-mkdoc-and-templates.md
    - prompts/04-mascot-generator.md
    - prompts/05-book-chapter-generator.md

  - FAQ: faq.md
  - Glossary: glossary.md
  - References: references.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  palette:
    primary: 'teal'
    accent: 'white'
  logo: img/mascot/neutral.png
  favicon: img/favicon.png
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/config.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Theory of Knowledge
  textbook_version: "1.0"
